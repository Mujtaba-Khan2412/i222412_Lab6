<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Profile Card</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background: #f0f0f0;
        font-family: Arial, sans-serif;
      }

      .card {
        background: white;
        width: 300px;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        text-align: center;
        transition: transform 0.3s;
      }

      .card:hover {
        transform: scale(1.05);
      }

      .card img {
        width: 100px;
        height: 100px;
        border-radius: 50%;
        margin-bottom: 15px;
      }

      .card h2 {
        margin-bottom: 10px;
      }

      .basic-info {
        margin-bottom: 15px;
        font-size: 14px;
      }

      .additional-info {
        display: none;
        margin: 15px 0;
        font-size: 14px;
        text-align: left;
        background: #f9f9f9;
        padding: 10px;
        border-radius: 5px;
      }

      .additional-info.show {
        display: block;
      }

      button {
        padding: 8px 15px;
        background: #007bff;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
      }

      button:hover {
        background: #0056b3;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <img src="https://via.placeholder.com/100" alt="Student" />

      <div class="basic-info">
        <h2>Ahmed Khan</h2>
        <p><strong>Reg No:</strong> i222412</p>
        <p><strong>Department:</strong> Computer Science</p>
      </div>

      <div class="additional-info">
        <p><strong>Email:</strong> ahmed@email.com</p>
        <p><strong>Hobbies:</strong> Reading, Gaming, Coding</p>
        <p><strong>Skills:</strong> HTML, CSS, JavaScript</p>
      </div>

      <button onclick="toggleDetails()">Show More</button>
    </div>

    <script>
      function toggleDetails() {
        const details = document.querySelector(".additional-info");
        const btn = document.querySelector("button");

        details.classList.toggle("show");
        btn.textContent = details.classList.contains("show")
          ? "Show Less"
          : "Show More";
      }
    </script>
  </body>
</html>
