<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registration Form - Real Time Validation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      .input-valid {
        border-color: rgb(34, 197, 94);
        border-width: 2px;
      }
      .input-invalid {
        border-color: rgb(239, 68, 68);
        border-width: 2px;
      }
      .error-message {
        color: rgb(239, 68, 68);
        font-size: 0.875rem;
        margin-top: 0.25rem;
      }
      .success-message {
        color: rgb(34, 197, 94);
        font-size: 0.875rem;
        margin-top: 0.25rem;
      }
    </style>
  </head>
  <body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white rounded-lg shadow-lg p-8 w-full max-w-md">
      <h1 class="text-3xl font-bold mb-6 text-gray-800">Registration Form</h1>

      <form id="registrationForm" class="space-y-4">
        <div>
          <label class="block text-gray-700 font-semibold mb-2">Name</label>
          <input
            type="text"
            id="name"
            class="w-full px-4 py-2 border-2 rounded-lg focus:outline-none transition"
            placeholder="Enter your name"
          />
          <div id="nameError" class="error-message"></div>
        </div>

        <div>
          <label class="block text-gray-700 font-semibold mb-2">Email</label>
          <input
            type="email"
            id="email"
            class="w-full px-4 py-2 border-2 rounded-lg focus:outline-none transition"
            placeholder="Enter your email"
          />
          <div id="emailError" class="error-message"></div>
        </div>

        <div>
          <label class="block text-gray-700 font-semibold mb-2">Password</label>
          <input
            type="password"
            id="password"
            class="w-full px-4 py-2 border-2 rounded-lg focus:outline-none transition"
            placeholder="Enter your password"
          />
          <div id="passwordError" class="error-message"></div>
        </div>

        <div>
          <label class="block text-gray-700 font-semibold mb-2"
            >Confirm Password</label
          >
          <input
            type="password"
            id="confirmPassword"
            class="w-full px-4 py-2 border-2 rounded-lg focus:outline-none transition"
            placeholder="Confirm your password"
          />
          <div id="confirmPasswordError" class="error-message"></div>
        </div>

        <div>
          <label class="block text-gray-700 font-semibold mb-2">Age</label>
          <input
            type="number"
            id="age"
            class="w-full px-4 py-2 border-2 rounded-lg focus:outline-none transition"
            placeholder="Enter your age"
          />
          <div id="ageError" class="error-message"></div>
        </div>

        <button
          type="submit"
          id="submitBtn"
          class="w-full bg-blue-600 text-white font-bold py-2 rounded-lg mt-6 disabled:bg-gray-400 disabled:cursor-not-allowed hover:bg-blue-700 transition"
        >
          Submit
        </button>
      </form>
    </div>

    <script>
      const form = document.getElementById("registrationForm");
      const nameInput = document.getElementById("name");
      const emailInput = document.getElementById("email");
      const passwordInput = document.getElementById("password");
      const confirmPasswordInput = document.getElementById("confirmPassword");
      const ageInput = document.getElementById("age");
      const submitBtn = document.getElementById("submitBtn");

      function checkName() {
        var error = document.getElementById("nameError");
        if (nameInput.value.length >= 3) {
          nameInput.classList.remove("input-invalid");
          nameInput.classList.add("input-valid");
          error.textContent = "";
          return true;
        } else {
          nameInput.classList.remove("input-valid");
          nameInput.classList.add("input-invalid");
          error.textContent = "Name must be at least 3 characters";
          return false;
        }
      }

      function checkEmail() {
        var error = document.getElementById("emailError");
        if (emailInput.value.includes("@") && emailInput.value.includes(".")) {
          emailInput.classList.remove("input-invalid");
          emailInput.classList.add("input-valid");
          error.textContent = "";
          return true;
        } else {
          emailInput.classList.remove("input-valid");
          emailInput.classList.add("input-invalid");
          error.textContent = "Email must contain @ and .";
          return false;
        }
      }

      function checkPassword() {
        var error = document.getElementById("passwordError");
        var hasNumber = false;
        var i = 0;
        while (i < passwordInput.value.length) {
          if (passwordInput.value[i] >= "0" && passwordInput.value[i] <= "9") {
            hasNumber = true;
          }
          i = i + 1;
        }

        if (passwordInput.value.length >= 6 && hasNumber) {
          passwordInput.classList.remove("input-invalid");
          passwordInput.classList.add("input-valid");
          error.textContent = "";
          return true;
        } else {
          passwordInput.classList.remove("input-valid");
          passwordInput.classList.add("input-invalid");
          error.textContent =
            "Password must be at least 6 characters with a number";
          return false;
        }
      }

      function checkConfirmPassword() {
        var error = document.getElementById("confirmPasswordError");
        if (
          confirmPasswordInput.value.length > 0 &&
          confirmPasswordInput.value === passwordInput.value
        ) {
          confirmPasswordInput.classList.remove("input-invalid");
          confirmPasswordInput.classList.add("input-valid");
          error.textContent = "";
          return true;
        } else {
          confirmPasswordInput.classList.remove("input-valid");
          confirmPasswordInput.classList.add("input-invalid");
          error.textContent = "Passwords must match";
          return false;
        }
      }

      function checkAge() {
        var error = document.getElementById("ageError");
        if (ageInput.value >= 18 && ageInput.value <= 60) {
          ageInput.classList.remove("input-invalid");
          ageInput.classList.add("input-valid");
          error.textContent = "";
          return true;
        } else {
          ageInput.classList.remove("input-valid");
          ageInput.classList.add("input-invalid");
          error.textContent = "Age must be between 18 and 60";
          return false;
        }
      }

      function updateSubmitButton() {
        const nameOk = checkName();
        const emailOk = checkEmail();
        const passwordOk = checkPassword();
        const confirmPasswordOk = checkConfirmPassword();
        const ageOk = checkAge();

        if (nameOk && emailOk && passwordOk && confirmPasswordOk && ageOk) {
          submitBtn.disabled = false;
        } else {
          submitBtn.disabled = true;
        }
      }

      nameInput.addEventListener("input", function () {
        checkName();
        updateSubmitButton();
      });

      emailInput.addEventListener("input", function () {
        checkEmail();
        updateSubmitButton();
      });

      passwordInput.addEventListener("input", function () {
        checkPassword();
        checkConfirmPassword();
        updateSubmitButton();
      });

      confirmPasswordInput.addEventListener("input", function () {
        checkConfirmPassword();
        updateSubmitButton();
      });

      ageInput.addEventListener("input", function () {
        checkAge();
        updateSubmitButton();
      });

      form.addEventListener("submit", function (e) {
        e.preventDefault();
        alert("Form submitted successfully!");
      });

      updateSubmitButton();
    </script>
  </body>
</html>
