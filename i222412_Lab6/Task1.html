<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registration Form - Real Time Validation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      .input-valid {
        border-color: rgb(34, 197, 94);
        border-width: 2px;
      }
      .input-invalid {
        border-color: rgb(239, 68, 68);
        border-width: 2px;
      }
      .error-message {
        color: rgb(239, 68, 68);
        font-size: 0.875rem;
        margin-top: 0.25rem;
      }
      .success-message {
        color: rgb(34, 197, 94);
        font-size: 0.875rem;
        margin-top: 0.25rem;
      }
    </style>
  </head>
  <body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white rounded-lg shadow-lg p-8 w-full max-w-md">
      <h1 class="text-3xl font-bold mb-6 text-gray-800">Registration Form</h1>

      <form id="registrationForm" class="space-y-4">
        <div>
          <label class="block text-gray-700 font-semibold mb-2">Name</label>
          <input
            type="text"
            id="name"
            class="w-full px-4 py-2 border-2 rounded-lg focus:outline-none transition"
            placeholder="Enter your name"
          />
          <div id="nameError" class="error-message"></div>
        </div>

        <div>
          <label class="block text-gray-700 font-semibold mb-2">Email</label>
          <input
            type="email"
            id="email"
            class="w-full px-4 py-2 border-2 rounded-lg focus:outline-none transition"
            placeholder="Enter your email"
          />
          <div id="emailError" class="error-message"></div>
        </div>

        <div>
          <label class="block text-gray-700 font-semibold mb-2">Password</label>
          <input
            type="password"
            id="password"
            class="w-full px-4 py-2 border-2 rounded-lg focus:outline-none transition"
            placeholder="Enter your password"
          />
          <div id="passwordError" class="error-message"></div>
        </div>

        <div>
          <label class="block text-gray-700 font-semibold mb-2"
            >Confirm Password</label
          >
          <input
            type="password"
            id="confirmPassword"
            class="w-full px-4 py-2 border-2 rounded-lg focus:outline-none transition"
            placeholder="Confirm your password"
          />
          <div id="confirmPasswordError" class="error-message"></div>
        </div>

        <div>
          <label class="block text-gray-700 font-semibold mb-2">Age</label>
          <input
            type="number"
            id="age"
            class="w-full px-4 py-2 border-2 rounded-lg focus:outline-none transition"
            placeholder="Enter your age"
          />
          <div id="ageError" class="error-message"></div>
        </div>

        <button
          type="submit"
          id="submitBtn"
          class="w-full bg-blue-600 text-white font-bold py-2 rounded-lg mt-6 disabled:bg-gray-400 disabled:cursor-not-allowed hover:bg-blue-700 transition"
        >
          Submit
        </button>
      </form>
    </div>

    <script>
      const form = document.getElementById("registrationForm");
      const nameInput = document.getElementById("name");
      const emailInput = document.getElementById("email");
      const passwordInput = document.getElementById("password");
      const confirmPasswordInput = document.getElementById("confirmPassword");
      const ageInput = document.getElementById("age");
      const submitBtn = document.getElementById("submitBtn");

      const validationRules = {
        name: {
          validator: (value) => value.length >= 3,
          message: "Name must be at least 3 characters",
        },
        email: {
          validator: (value) => value.includes("@") && value.includes("."),
          message: "Email must contain @ and .",
        },
        password: {
          validator: (value) => value.length >= 6 && /\d/.test(value),
          message: "Password must be at least 6 characters with a number",
        },
        confirmPassword: {
          validator: (value) =>
            value === passwordInput.value && value.length > 0,
          message: "Passwords must match",
        },
        age: {
          validator: (value) => value >= 18 && value <= 60,
          message: "Age must be between 18 and 60",
        },
      };

      function validateField(fieldName, input) {
        const rule = validationRules[fieldName];
        const isValid = rule.validator(input.value);
        const errorEl = document.getElementById(fieldName + "Error");

        if (isValid) {
          input.classList.remove("input-invalid");
          input.classList.add("input-valid");
          errorEl.textContent = "";
        } else {
          input.classList.remove("input-valid");
          input.classList.add("input-invalid");
          errorEl.textContent = rule.message;
        }

        return isValid;
      }

      function isFormValid() {
        return Object.keys(validationRules).every((field) =>
          validationRules[field].validator(
            document.getElementById(field).value,
          ),
        );
      }

      function updateSubmitButton() {
        submitBtn.disabled = !isFormValid();
      }

      nameInput.addEventListener("input", () => {
        validateField("name", nameInput);
        updateSubmitButton();
      });

      emailInput.addEventListener("input", () => {
        validateField("email", emailInput);
        updateSubmitButton();
      });

      passwordInput.addEventListener("input", () => {
        validateField("password", passwordInput);
        validateField("confirmPassword", confirmPasswordInput);
        updateSubmitButton();
      });

      confirmPasswordInput.addEventListener("input", () => {
        validateField("confirmPassword", confirmPasswordInput);
        updateSubmitButton();
      });

      ageInput.addEventListener("input", () => {
        validateField("age", ageInput);
        updateSubmitButton();
      });

      form.addEventListener("submit", (e) => {
        e.preventDefault();
        alert("Form submitted successfully!");
      });

      updateSubmitButton();
    </script>
  </body>
</html>
